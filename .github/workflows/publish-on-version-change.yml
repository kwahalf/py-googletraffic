name: Publish to PyPI on Push to Main

on:
  push:
    branches:
      - main
    paths:
      - 'googletraffic/**'
      - 'setup.py'
      - 'pyproject.toml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.changed }}
      new_version: ${{ steps.version_check.outputs.version }}
    
    steps:
      - name: Checkout current code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Check if version changed
        id: version_check
        run: |
          # Get current version (parse from file without importing)
          CURRENT_VERSION=$(grep '__version__' googletraffic/__init__.py | cut -d '"' -f 2)
          echo "Current version: $CURRENT_VERSION"
          
          # Get previous version from last commit
          git checkout HEAD~1 2>/dev/null || git checkout HEAD
          PREV_VERSION=$(grep '__version__' googletraffic/__init__.py 2>/dev/null | cut -d '"' -f 2 || echo "0.0.0")
          echo "Previous version: $PREV_VERSION"
          
          git checkout -
          
          # Compare versions
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Version changed: $PREV_VERSION → $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "ℹ️ Version unchanged: $CURRENT_VERSION"
          fi

  build-and-publish:
    name: Build and publish to PyPI
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel
      
      - name: Build package
        run: |
          python -m build
      
      - name: Check package
        run: |
          twine check dist/*
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* --skip-existing
      
      - name: Create Git Tag
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "v$VERSION" -m "Release version $VERSION"
          git push origin "v$VERSION"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Release v${{ needs.check-version.outputs.new_version }}
          body: |
            Release version ${{ needs.check-version.outputs.new_version }}
            
            See [CHANGELOG.md](https://github.com/kwahalf/py-googletraffic/blob/main/CHANGELOG.md) for details.
            
            ## Installation
            
            ```bash
            pip install py-googletraffic==${{ needs.check-version.outputs.new_version }}
            ```
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
