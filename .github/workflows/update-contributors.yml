name: Update Contributors

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CONTRIBUTORS.md'  # Prevent infinite loop
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # For creating branch
  pull-requests: write  # For creating PR

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches
          token: ${{ secrets.REPO_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Generate contributors file
        run: |
          python scripts/generate_contributors.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet CONTRIBUTORS.md || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update CONTRIBUTORS.md"
          branch: update-contributors-auto
          delete-branch: true
          title: "chore: Update CONTRIBUTORS.md"
          body: |
            ## 🤖 Automated Update
            
            This PR updates CONTRIBUTORS.md based on the latest git commit history.
            
            ### Changes
            - Updated contributor commit counts
            - Added new contributors (if any)
            - Updated contribution dates
            
            ### Review
            Please review the changes and merge if they look correct.
            
            ---
            *This PR was automatically created by [GitHub Actions](.github/workflows/update-contributors.yml)*
          labels: documentation, automated
          assignees: kwahalf
