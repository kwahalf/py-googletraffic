name: Update Contributors

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CONTRIBUTORS.md'  # Prevent infinite loop
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Allow writing to repository

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Generate contributors file
        run: |
          python scripts/generate_contributors.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet CONTRIBUTORS.md || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CONTRIBUTORS.md
          git commit -m "docs: update CONTRIBUTORS.md [skip ci]"
          git push
